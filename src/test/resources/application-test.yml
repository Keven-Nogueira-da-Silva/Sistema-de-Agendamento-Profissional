spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///test_db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false # Desativado para testes simples com Testcontainers, mas em prod ele roda as migrations
